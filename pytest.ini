[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require API keys and external services)
    slow: Slow running tests (performance and stress tests)
    api_required: Tests requiring API keys
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Test selection shortcuts
# Run only unit tests: pytest -m unit
# Run only integration tests: pytest -m integration
# Run fast tests only: pytest -m "not slow"
# Run without API: pytest -m "not api_required"